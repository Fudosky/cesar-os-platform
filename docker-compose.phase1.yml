# Cesar OS Platform — Fase 1: chat móvil (Open WebUI) + RAG (Qdrant)
# Open WebUI = "tu iPhone hablando con todos los modelos", multi-usuario, PWA.
# Desplegar (ENCIMA de la Fase 0):
#   docker compose -f docker-compose.yml -f docker-compose.phase1.yml up -d
name: cesar-os

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      - litellm
      - qdrant
    environment:
      # Conecta Open WebUI al gateway LiteLLM → todos los modelos en un solo lugar
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      ENABLE_OLLAMA_API: "false"
      WEBUI_NAME: "Cesar OS"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      # RAG con Qdrant (búsqueda en documentos/vault)
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:6333
      # Multi-usuario: el 1er registro = admin (Cesar); luego invitas a Caterine
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: pending
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  qdrant_data:
  openwebui_data:
