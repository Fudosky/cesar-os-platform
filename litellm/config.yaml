# LiteLLM — gateway único de LLM (ruteo + caching + observabilidad + presupuesto)
# Todo el resto de la plataforma habla SOLO con LiteLLM (endpoint OpenAI-compatible).

model_list:
  # --- Claude (de pago, para agentes expertos / decisiones estratégicas) ---
  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  # --- Groq (rápido y barato, para rutina) ---
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  # --- OpenRouter (modelos gratis/variados) ---
  - model_name: or-gptoss
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  # Caching en Redis: ahorra repitiendo contexto idéntico
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
  # Observabilidad: cada llamada (latencia, tokens, costo) va a Langfuse
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

router_settings:
  routing_strategy: simple-shuffle
  # Fallback de costo/disponibilidad: si Opus falla → Sonnet → Groq
  fallbacks:
    - opus: ["sonnet"]
    - sonnet: ["groq-llama"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Presupuesto mensual duro: se configura por llave en la UI de LiteLLM (:4000/ui)
